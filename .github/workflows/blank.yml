name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Check Typst formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install typstyle
        run: cargo install typstyle --locked

      - name: Check formatting
        run: |
          typstyle \
            --line-width 80 \
            --indent-width 2 \
            --no-reorder-import-items \
            --check .

  build:
    name: Compile Typst
    runs-on: ubuntu-latest
    needs: format

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.15.0

      - name: Compile main.typ
        run: typst compile main.typ main.pdf

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: main-pdf
          path: main.pdf
